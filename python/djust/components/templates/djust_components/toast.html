<div class="dj-toast-container">
{% for toast in toasts %}
<div class="dj-toast dj-toast--{{ toast.type }}" role="{% if toast.type == "error" %}alert{% else %}status{% endif %}" aria-live="{% if toast.type == "error" %}assertive{% else %}polite{% endif %}">
  <span class="dj-toast__icon" aria-hidden="true">
    {% if toast.type == "success" %}&#10003;{% endif %}
    {% if toast.type == "error" %}&#10007;{% endif %}
    {% if toast.type == "warning" %}&#9888;{% endif %}
    {% if toast.type == "info" %}&#8505;{% endif %}
  </span>
  <span class="dj-toast__message">{{ toast.message }}</span>
  <button class="dj-toast__dismiss" aria-label="Dismiss" dj-click="{{ dismiss_event }}" data-value="{{ toast.id }}">&times;</button>
</div>
{% empty %}
<div class="dj-toast-container--empty"></div>
{% endfor %}
</div>
