name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Set up Rust
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        components: rustfmt, clippy

    # Set up Python with uv
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    # Set up Node.js for JavaScript tests
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # Install dependencies
    - name: Install Python dependencies
      run: |
        uv sync --extra dev

    - name: Build Rust extensions
      run: |
        uv run maturin develop --release

    - name: Install JavaScript dependencies
      run: npm install

    # Run tests
    - name: Run Rust tests
      run: |
        # Set PYO3_PYTHON and exclude djust_live (PyO3 extension module - tested via Python)
        export PYO3_PYTHON=$(pwd)/.venv/bin/python
        cargo test --workspace --exclude djust_live

    - name: Run Python tests
      run: |
        PYTHONPATH=. .venv/bin/python -m pytest tests/ python/tests/ -v

    - name: Run JavaScript tests
      run: npm test

    # Linting
    - name: Run Rust linter
      run: |
        # Set PYO3_PYTHON for clippy
        export PYO3_PYTHON=$(pwd)/.venv/bin/python
        # Allow style warnings, only fail on correctness and suspicious patterns
        cargo clippy -- -W clippy::all -D clippy::correctness -D clippy::suspicious
      continue-on-error: false

    - name: Check Rust formatting
      run: cargo fmt --check

    - name: Run Python linter
      run: uv run ruff check python/

  test-summary:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "Test workflow completed"
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ All tests passed!"
          else
            echo "❌ Tests failed"
            exit 1
          fi
