apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: django-rust-ingress
  namespace: django-rust
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # WebSocket support for Django Channels
    nginx.ingress.kubernetes.io/websocket-services: "django-rust-live"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - django-rust.k8.trylinux.org
    secretName: django-rust-tls
  rules:
  - host: django-rust.k8.trylinux.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: django-rust-live
            port:
              number: 8000
